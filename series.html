<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Details - TollyFlix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <a href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:16px;">
                <img src="logo.png" alt="TollyFlix Logo" class="header-logo-img">
                <h1 style="margin:0;">🎬 TollyFlix</h1>
            </a>
        </div>
        <p class="tagline">Discover Telugu Movies, Ratings, Trailers & More</p>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:10px;">
            <button onclick="history.back()">⬅️ Back</button>
            <button id="shareBtn">📤 Share</button>
            <button id="wlBtn">🕐 Watch Later</button>
        </div>
    </header>

    <div id="toast" class="toast"></div>
    <div id="loader" class="loader"></div>
    <div id="seriesDetails"></div>
    <div id="trailerContainer"></div>
    <div id="castContainer"></div>
    <div id="similarContainer"></div>

    <script>
    const API_KEY = "414fa9cd1d5abe3a521d0c8b4d8d9d2a";
    const seriesId = new URLSearchParams(window.location.search).get("id");

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
    }

    if (localStorage.getItem("theme") === "light") document.body.classList.add("light");

    function renderStars(id) {
        const ratings = JSON.parse(localStorage.getItem("tf_ratings")) || {};
        const cur = ratings[id] || 0;
        let html = `<div class="star-rating" id="starRating">`;
        for (let i = 1; i <= 5; i++) html += `<span class="star ${i <= cur ? 'filled' : ''}" data-val="${i}">★</span>`;
        html += cur ? `<span class="star-label">Your Rating: ${cur}/5</span>` : `<span class="star-label">Rate this</span>`;
        return html + `</div>`;
    }

    function bindStars(id) {
        document.querySelectorAll(".star").forEach(star => {
            star.addEventListener("click", () => {
                const val = parseInt(star.dataset.val);
                const ratings = JSON.parse(localStorage.getItem("tf_ratings")) || {};
                ratings[id] = val;
                localStorage.setItem("tf_ratings", JSON.stringify(ratings));
                document.getElementById("starRating").outerHTML = renderStars(id);
                bindStars(id);
                showToast(`⭐ Rated ${val}/5!`);
            });
            star.addEventListener("mouseover", () => {
                const val = parseInt(star.dataset.val);
                document.querySelectorAll(".star").forEach((s, i) => s.classList.toggle("hover", i < val));
            });
            star.addEventListener("mouseout", () => {
                document.querySelectorAll(".star").forEach(s => s.classList.remove("hover"));
            });
        });
    }

    async function loadSeries() {
        document.getElementById("loader").style.display = "block";
        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}?api_key=${API_KEY}`);
            const s = await res.json();

            const poster = s.poster_path
                ? `https://image.tmdb.org/t/p/w500${s.poster_path}`
                : "https://via.placeholder.com/300x450?text=No+Image";

            const genres = s.genres?.map(g => `<span class="genre-tag">${g.name}</span>`).join("") || "";

            document.getElementById("seriesDetails").innerHTML = `
                <div class="details-container">
                    <div class="poster-col">
                        <img src="${poster}" alt="${s.name}">
                    </div>
                    <div class="details-info">
                        <h1>${s.name}</h1>
                        <div class="genre-tags">${genres}</div>
                        <p><strong>📅 First Air Date:</strong> ${s.first_air_date || "N/A"}</p>
                        <p><strong>⭐ Rating:</strong> ${s.vote_average?.toFixed(1)} / 10</p>
                        <p><strong>📺 Seasons:</strong> ${s.number_of_seasons || "N/A"}</p>
                        <p><strong>🎬 Episodes:</strong> ${s.number_of_episodes || "N/A"}</p>
                        <p><strong>🌐 Language:</strong> ${s.original_language?.toUpperCase()}</p>
                        <p><strong>📡 Status:</strong> ${s.status || "N/A"}</p>
                        ${renderStars(seriesId)}
                        <h3>📖 Story</h3>
                        <p>${s.overview || "No description available."}</p>
                    </div>
                    <div class="ott-col" id="ottInline">
                        <p style="color:#aaa;font-size:13px;">⏳ Loading platforms...</p>
                    </div>
                </div>
            `;
            document.title = `${s.name} - TollyFlix`;
            bindStars(seriesId);
            loadProviders(s.name);
            loadTrailer();
            loadCast();
            loadSimilar(s.original_language);
        } catch (err) {
            document.getElementById("seriesDetails").innerHTML = "<p>Failed to load series details.</p>";
        } finally {
            document.getElementById("loader").style.display = "none";
        }
    }

    async function loadTrailer() {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}/videos?api_key=${API_KEY}`);
            const data = await res.json();
            const trailer = data.results?.find(v => v.site === "YouTube" && v.type === "Trailer");
            if (!trailer) { document.getElementById("trailerContainer").innerHTML = "<p style='text-align:center;padding:20px;'>🎬 Trailer Not Available</p>"; return; }
            document.getElementById("trailerContainer").innerHTML = `
                <div class="section-title">🎬 Official Trailer</div>
                <div class="trailer-wrapper">
                    <iframe src="https://www.youtube.com/embed/${trailer.key}?rel=0" title="Series Trailer"
                        frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>`;
        } catch(e) { document.getElementById("trailerContainer").innerHTML = ""; }
    }

    async function loadProviders(seriesName) {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}/watch/providers?api_key=${API_KEY}`);
            const data = await res.json();
            const region = data.results?.IN || data.results?.US;
            const target = document.getElementById("ottInline");

            const ottLinks = {
                "Netflix": "https://www.netflix.com/search?q=",
                "Amazon Prime Video": "https://www.primevideo.com/search/ref=atv_nb_sr?phrase=",
                "Disney+ Hotstar": "https://www.hotstar.com/in/search?q=",
                "Hotstar": "https://www.hotstar.com/in/search?q=",
                "ZEE5": "https://www.zee5.com/search?q=",
                "SonyLIV": "https://www.sonyliv.com/search?q=",
                "Aha": "https://www.aha.video/search?q=",
                "Sun NXT": "https://www.sunnxt.com/search?searchterm=",
                "MX Player": "https://www.mxplayer.in/search?q=",
                "JioCinema": "https://www.jiocinema.com/search?q=",
                "Apple TV": "https://tv.apple.com/search?term="
            };

            const encodedTitle = encodeURIComponent(seriesName);
            let html = "";

            if (region) {
                const all = [...(region.flatrate||[]),...(region.rent||[]),...(region.buy||[])];
                const unique = all.filter((p,i,s)=>i===s.findIndex(x=>x.provider_id===p.provider_id));
                if (unique.length > 0) {
                    html += `<div class="ott-inline-title">📺 Where to Watch</div><div class="ott-inline">`;
                    unique.forEach(p => {
                        const logo = `https://image.tmdb.org/t/p/w92${p.logo_path}`;
                        const link = ottLinks[p.provider_name] ? ottLinks[p.provider_name] + encodedTitle : region.link || "#";
                        const isStream = (region.flatrate||[]).find(x=>x.provider_id===p.provider_id);
                        html += `<a href="${link}" target="_blank" class="ott-pill" title="${p.provider_name}">
                            <img src="${logo}" alt="${p.provider_name}">
                            <span>${p.provider_name}</span>
                            <span class="ott-badge ${isStream?'stream':'rent'}">${isStream?'Stream':'Rent'}</span>
                        </a>`;
                    });
                    html += `</div>`;
                } else {
                    html += `<p style="color:#aaa;font-size:13px;margin:12px 0;">📺 Not available on streaming platforms.</p>`;
                }
            } else {
                html += `<p style="color:#aaa;font-size:13px;margin:12px 0;">📺 Not available in your region.</p>`;
            }

            const spotifyUrl = `https://open.spotify.com/search/${encodedTitle}%20songs`;
            html += `<div class="ott-inline-title" style="margin-top:15px;">🎵 Songs</div>
                <div class="ott-inline">
                    <a href="${spotifyUrl}" target="_blank" class="ott-pill spotify-pill">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Spotify_logo_without_text.svg/168px-Spotify_logo_without_text.svg.png" alt="Spotify">
                        <span>Listen on Spotify</span>
                        <span class="ott-badge stream">Songs</span>
                    </a>
                </div>`;

            target.innerHTML = html;
        } catch(e) { document.getElementById("ottInline").innerHTML = ""; }
    }

    async function loadCast() {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}/credits?api_key=${API_KEY}`);
            const data = await res.json();
            if (!data.cast?.length) return;

            let html = `<div class="section-title">🎭 Cast</div><div class="cast-container">`;
            data.cast.slice(0, 12).forEach(actor => {
                const photo = actor.profile_path
                    ? `https://image.tmdb.org/t/p/w200${actor.profile_path}`
                    : "https://via.placeholder.com/200x300?text=No+Photo";
                html += `<div class="cast-card" onclick="window.location.href='person.html?id=${actor.id}'">
                    <img src="${photo}" alt="${actor.name}" loading="lazy">
                    <h4>${actor.name}</h4>
                    <p>${actor.character || ""}</p>
                </div>`;
            });
            html += `</div>`;
            document.getElementById("castContainer").innerHTML = html;
        } catch(e) {}
    }

    async function loadSimilar(lang) {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}/recommendations?api_key=${API_KEY}`);
            const data = await res.json();
            let results = (data.results || []).filter(s => s.poster_path && s.original_language === lang);

            if (results.length < 6) {
                const dr = await fetch(`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_original_language=${lang}&sort_by=popularity.desc`);
                const dd = await dr.json();
                const extra = (dd.results||[]).filter(s=>s.poster_path && s.id!==parseInt(seriesId) && !results.find(x=>x.id===s.id));
                results = [...results, ...extra];
            }

            results = results.slice(0, 12);
            if (!results.length) return;

            let html = `<div class="section-title">📺 Similar Series</div><div class="similar-container">`;
            results.forEach(s => {
                const year = (s.first_air_date||"").split("-")[0];
                html += `<div class="similar-card" onclick="window.location.href='series.html?id=${s.id}'">
                    <img src="https://image.tmdb.org/t/p/w300${s.poster_path}" alt="${s.name}" loading="lazy">
                    <p>${s.name}</p>
                    <small>⭐ ${s.vote_average?.toFixed(1)}${year?" · "+year:""}</small>
                </div>`;
            });
            html += `</div>`;
            document.getElementById("similarContainer").innerHTML = html;
        } catch(e) {}
    }

    document.getElementById("shareBtn")?.addEventListener("click", () => {
        const url = window.location.href;
        if (navigator.share) navigator.share({ title: document.title, url });
        else { navigator.clipboard.writeText(url); showToast("🔗 Link copied!"); }
    });

    document.getElementById("wlBtn")?.addEventListener("click", async () => {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${seriesId}?api_key=${API_KEY}`);
        const s = await res.json();
        let wl = JSON.parse(localStorage.getItem("watchLater")) || [];
        if (!wl.find(m => m.id === s.id)) {
            wl.push({ ...s, title: s.name, _type: "tv" });
            localStorage.setItem("watchLater", JSON.stringify(wl));
            showToast("🕐 Added to Watch Later!");
        } else {
            showToast("Already in Watch Later!");
        }
    });

    if (seriesId) loadSeries();
    </script>
</body>
</html>
